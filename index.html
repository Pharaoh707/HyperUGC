    <!-- Prevent window.fetch readonly setter crash in sandboxed/iframe environments -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          
          // Try to redefine window.fetch locally first
          try {
            Object.defineProperty(window, "fetch", {
              get: function() { return originalFetch; },
              set: function(val) { originalFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (e1) {
            console.warn("Direct window.fetch override skipped, trying prototype", e1);
            try {
              var WinProto = window.Window ? window.Window.prototype : Object.getPrototypeOf(window);
              if (WinProto) {
                Object.defineProperty(WinProto, "fetch", {
                  get: function() { return originalFetch; },
                  set: function(val) { originalFetch = val; },
                  configurable: true,
                  enumerable: true
                });
              }
            } catch (e2) {
              console.warn("Prototype window.fetch override skipped", e2);
            }
          }

          // Define a safe globalThis proxy as an additional layer of safety
          var originalGlobalThis = window.globalThis || window;
          var globalThisProxy = new Proxy(originalGlobalThis, {
            get: function(target, prop) {
              if (prop === 'fetch') {
                return originalFetch;
              }
              var val = target[prop];
              if (typeof val === 'function') {
                return val.bind(target);
              }
              return val;
            },
            set: function(target, prop, value) {
              if (prop === 'fetch') {
                console.info("Intercepted write to globalThis.fetch, retaining original");
                originalFetch = value;
                return true;
              }
              try {
                target[prop] = value;
                return true;
              } catch (e) {
                console.warn("Could not set property on globalThis:", prop, e);
                return true; // prevent strict mode crash
              }
            }
          });

          var desc = Object.getOwnPropertyDescriptor(window, 'globalThis');
          if (!desc || desc.configurable) {
            Object.defineProperty(window, 'globalThis', {
              value: globalThisProxy,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error("Global safe-fetch setup completed with status:", e);
        }
      })();
    </script>
